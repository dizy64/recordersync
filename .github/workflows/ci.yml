name: CI

on:
  push:
    branches: [main]
  pull_request: {}

permissions:
  contents: read

jobs:
  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          python-version: "3.14"
      - run: uv sync --frozen
      - run: uv run pytest tests/unit -v --tb=short

  e2e-test:
    name: Synthetic FFmpeg E2E
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - name: FFmpeg 설치
        run: |
          sudo apt-get update
          sudo apt-get install --yes ffmpeg
          ffmpeg -hide_banner -encoders 2>/dev/null | grep libx265
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          python-version: "3.14"
      - run: uv sync --frozen
      - run: bash scripts/test-e2e.sh

  quality:
    name: Lint, Types, Security, Complexity, Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          python-version: "3.14"
      - run: uv sync --frozen
      - run: uv run ruff check recordersync tests scripts
      - run: uv run ruff format --check recordersync tests scripts
      - run: uv run python scripts/check_markdown_links.py
      - run: uv run mypy recordersync
      - run: uv run pip-audit
      - run: uv run radon cc recordersync -a -nc
      - run: uv run radon mi recordersync -s
      - run: uv build
